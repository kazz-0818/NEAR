# main への push / PR でビルド検証。Render は commit トリガーで push 直後にデプロイ（このジョブ完了を待たない）。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# デフォルト GITHUB_TOKEN の権限を明示（組織ポリシーでブロックされにくくする）
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
